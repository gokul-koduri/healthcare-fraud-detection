# Docker Compose for local development and testing
version: '3.8'

services:
  # Main API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: healthcare-fraud-api
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=config/config.yaml
      - MODEL_PATH=models/ensemble_model_latest
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
    volumes:
      - ./config:/app/config
      - ./models:/app/models
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      - mlflow
      - postgres
    networks:
      - healthcare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # MLflow tracking server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: healthcare-mlflow
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE=postgresql://mlflow:mlflow@postgres:5432/mlflow
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      - postgres
    networks:
      - healthcare-network
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

  # PostgreSQL for MLflow
  postgres:
    image: postgres:15-alpine
    container_name: healthcare-postgres
    environment:
      - POSTGRES_DB=mlflow
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - healthcare-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "6379:6379"
    networks:
      - healthcare-network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: healthcare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - healthcare-network
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: healthcare-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - healthcare-network
    restart: unless-stopped

  # Jupyter for development
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: healthcare-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    networks:
      - healthcare-network
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''
    restart: unless-stopped

  # dbt for transformations
  dbt:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: healthcare-dbt
    volumes:
      - ./dbt:/app/dbt
      - ~/.dbt:/root/.dbt
    working_dir: /app/dbt
    networks:
      - healthcare-network
    command: tail -f /dev/null
    restart: unless-stopped

networks:
  healthcare-network:
    driver: bridge

volumes:
  mlflow-artifacts:
  postgres-data:
  prometheus-data:
  grafana-data:
