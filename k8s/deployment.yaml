# Kubernetes Deployment for Healthcare Fraud Detection API

apiVersion: v1
kind: Namespace
metadata:
  name: healthcare-fraud
  labels:
    name: healthcare-fraud
    env: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: healthcare-fraud
data:
  CONFIG_PATH: "config/config.yaml"
  MODEL_PATH: "models/ensemble_model_latest"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: healthcare-fraud
type: Opaque
stringData:
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  SNOWFLAKE_USER: "${SNOWFLAKE_USER}"
  SNOWFLAKE_PASSWORD: "${SNOWFLAKE_PASSWORD}"
  SNOWFLAKE_ACCOUNT: "${SNOWFLAKE_ACCOUNT}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  namespace: healthcare-fraud
  labels:
    app: fraud-detection-api
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-detection-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fraud-detection-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: ${REGISTRY}/healthcare-fraud-detection:${IMAGE_TAG:-latest}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: CONFIG_PATH
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONFIG_PATH
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MODEL_PATH
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: OPENAI_API_KEY
        - name: SNOWFLAKE_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SNOWFLAKE_USER
        - name: SNOWFLAKE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SNOWFLAKE_PASSWORD
        - name: SNOWFLAKE_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SNOWFLAKE_ACCOUNT
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: config
        configMap:
          name: app-config-files
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api
  namespace: healthcare-fraud
  labels:
    app: fraud-detection-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: fraud-detection-api

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: healthcare-fraud
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-detection-api-hpa
  namespace: healthcare-fraud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-detection-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fraud-detection-ingress
  namespace: healthcare-fraud
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.healthcare-fraud.company.com
    secretName: fraud-detection-tls
  rules:
  - host: api.healthcare-fraud.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fraud-detection-api
            port:
              number: 80
