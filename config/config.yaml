# Healthcare Claims Fraud Detection System Configuration

# Database Configuration
database:
  type: "snowflake"
  host: "localhost"
  account: "test_account"
  warehouse: "test_wh"
  database: "healthcare_claims"
  schema: "fraud_detection"
  user: "test_user"
  password: "test_password"

# Databricks Configuration
databricks:
  host: "https://test-databricks.com"
  token: "test_token"
  cluster_id: "test_cluster"
  workspace_path: "/Shared/healthcare-fraud-detection"

# AWS Configuration
aws:
  region: "us-east-1"
  lambda:
    function_name: "claims-processor"
    timeout: 300
    memory_size: 512
  s3:
    bucket: "healthcare-claims-data"
    raw_prefix: "raw/"
    processed_prefix: "processed/"

# Model Configuration
models:
  isolation_forest:
    n_estimators: 100
    max_samples: "auto"
    contamination: 0.1
    random_state: 42
    n_jobs: -1
    
  autoencoder:
    input_dim: 50
    encoding_dim: [32, 16, 8]
    decoding_dim: [16, 32]
    epochs: 50
    batch_size: 256
    learning_rate: 0.001
    activation: "relu"
    
  ensemble:
    voting: "soft"
    weights:
      isolation_forest: 0.4
      autoencoder: 0.6

# Feature Engineering
features:
  numerical_features:
    - "claim_amount"
    - "service_count"
    - "patient_age"
    - "provider_claim_frequency"
    - "diagnosis_code_count"
    - "procedure_code_count"
    
  categorical_features:
    - "provider_type"
    - "specialty"
    - "place_of_service"
    - "diagnosis_codes"
    - "procedure_codes"
    
  derived_features:
    - "amount_per_service"
    - "claim_frequency_ratio"
    - "outlier_score_provider"
    - "time_since_last_claim"

# Fraud Detection Thresholds
thresholds:
  fraud_probability: 0.7
  high_risk: 0.8
  medium_risk: 0.6
  low_risk: 0.4

# OpenAI Configuration
openai:
  model: "gpt-4"
  temperature: 0.3
  max_tokens: 2000
  api_key: "sk-test-key"

# LangChain Configuration
langchain:
  embedding_model: "text-embedding-ada-002"
  vector_store_type: "faiss"
  chunk_size: 1000
  chunk_overlap: 200

# Audit Report Configuration
audit:
  template_path: "config/audit_template.txt"
  output_format: ["pdf", "html", "json"]
  include_charts: true
  max_claims_per_report: 100

# MLflow Configuration
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "healthcare-fraud-detection"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
  rotation: "10 MB"
